<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arrow Mail</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="logo">↗ Arrow Mail</div>
      <nav>
        <button class="tab-btn active" data-tab="settings">⚙ Settings</button>
        <button class="tab-btn" data-tab="leads">👥 Contacts</button>
        <button class="tab-btn" data-tab="compose">✉ Compose</button>
      </nav>
      <div class="header-right">
        <span id="header-status"></span>
      </div>
    </header>
    <main>
      <div id="tab-settings" class="tab-content active"></div>
      <div id="tab-leads" class="tab-content"></div>
      <div id="tab-compose" class="tab-content"></div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
